version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://pirataria:pirataria@db/piratariaos
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pirataria
      - POSTGRES_PASSWORD=pirataria
      - POSTGRES_DB=piratariaos
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
