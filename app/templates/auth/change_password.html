{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card card-pirataria">
      <div class="card-body p-4">
        <h4 class="gold-text mb-3 text-center"><i class="bi bi-lock"></i> Alterar Senha</h4>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label small gold-text">Senha atual</label>
            <input type="password" name="current_password" class="form-control form-pirataria" required>
          </div>
          <div class="mb-3">
            <label class="form-label small gold-text">Nova senha</label>
            <input type="password" name="new_password" class="form-control form-pirataria" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-pirataria w-100">Alterar senha</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('dashboard.dashboard') }}" class="text-secondary small">Voltar</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
