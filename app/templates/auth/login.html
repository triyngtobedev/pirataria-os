{% extends "base.html" %}
{% block title %}Login — Pirataria Body Art OS{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card card-pirataria">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-skull" style="font-size:3rem;color:var(--gold);"></i>
                    <h4 class="gold-text mt-2">PIRATARIA BODY ART OS</h4>
                    <small class="text-secondary">Faça login no seu estúdio</small>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control form-pirataria" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control form-pirataria" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-pirataria w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-secondary">Não tem conta? <a href="{{ url_for('auth.register') }}" class="gold-text">Cadastre-se</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
