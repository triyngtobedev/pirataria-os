{% extends "base.html" %}
{% block title %}Cadastro — Pirataria Body Art OS{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card card-pirataria">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-skull" style="font-size:3rem;color:var(--gold);"></i>
                    <h4 class="gold-text mt-2">Criar Conta</h4>
                    <small class="text-secondary">Cadastre seu estúdio</small>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do Estúdio</label>
                        <input type="text" name="studio_nome" class="form-control form-pirataria" placeholder="Ex: Pirataria Body Art" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Seu Nome</label>
                        <input type="text" name="nome" class="form-control form-pirataria" placeholder="Ex: Lucas" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control form-pirataria" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control form-pirataria" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-pirataria w-100">Criar Conta</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-secondary">Já tem conta? <a href="{{ url_for('auth.login') }}" class="gold-text">Entrar</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
