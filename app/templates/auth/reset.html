{% extends "base.html" %}
{% block title %}Nova Senha{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card card-pirataria">
      <div class="card-body p-4">
        <h4 class="gold-text mb-3 text-center"><i class="bi bi-lock"></i> Redefinir Senha</h4>
        <p class="serif-subtitle text-center mb-4">Digite sua nova senha.</p>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <input type="password" name="password" class="form-control form-pirataria" placeholder="Nova senha (min. 6 caracteres)" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-pirataria w-100">Redefinir senha</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-secondary small">Voltar ao login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
